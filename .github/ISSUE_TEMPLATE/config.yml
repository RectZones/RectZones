blank_issues_enabled: false
contact_links:
  - name: Installation or usage question
    url: https://github.com/RectZones/RectZones#troubleshooting
    about: >
      The README troubleshooting section covers the permission-after-rebuild
      problem, conflicts with macOS tiling and other window managers, remapped
      modifier keys, and shortcut conflicts. Most questions are answered there.
  - name: Report a security vulnerability
    url: https://github.com/RectZones/RectZones/security/advisories/new
    about: >
      Please report security issues privately, not as a public issue.
      See SECURITY.md for what is in scope.
